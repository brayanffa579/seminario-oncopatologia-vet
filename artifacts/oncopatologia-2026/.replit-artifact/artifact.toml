kind = "web"
previewPath = "/"
title = "Seminario Oncopatología Veterinaria 2026"
version = "1.0.0"
id = "artifacts/oncopatologia-2026"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21798

[services.development]
run = "pnpm --filter @workspace/oncopatologia-2026 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oncopatologia-2026", "run", "build" ]
publicDir = "artifacts/oncopatologia-2026/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21798"
BASE_PATH = "/"
